name: Deploy Streamlit Apps to Snowflake

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Snowflake CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade snowflake-cli

      - name: Verify Snowflake CLI Version
        shell: bash
        run: snow --version

      - name: Create Snowflake Config
        shell: bash
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWCLI_PW }}
        run: |
          mkdir -p ~/.snowflake
          cp config.toml ~/.snowflake/config.toml
          sed -i "s/SNOWFLAKE_PASSWORD_PLACEHOLDER/$SNOWFLAKE_PASSWORD/" ~/.snowflake/config.toml
          chmod 0600 ~/.snowflake/config.toml

      - name: Deploy App One
        shell: bash
        run: |
          snow streamlit deploy app_one --connection DEV --replace

      # - name: Deploy App Two
      #   shell: bash
      #   run: |
      #     snow streamlit deploy app_two --connection DEV --replace